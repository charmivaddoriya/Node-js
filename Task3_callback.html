<!--Initialize two variables and increment both the variables each time and display the addition of both the variables at interval of 1 second.-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    Enter value for 'a':<input type="number" id="a" value=2>
    </br></br>
    Enter value for 'b':<input type="number" id="b" value=5>
</br></br>
<button onclick="start()">Start Addition</button>
<button onclick="reset()">Reset</button>
<p id="demo"></p>
<script>
    function start(){
        a=parseInt(document.getElementById("a").value);
        b=parseInt(document.getElementById("b").value); 
        var a1=a;
        var b1=b;
        obj=document.getElementById("demo")
        x=setInterval(()=>{
            obj.innerHTML=a1++ + b++;
        },1000)  
    }
    function reset(){
        clearInterval(x);
        document.getElementById("demo").innerHTML=a+b;
    }
</script>
</body>
</html>
